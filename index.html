<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта модулей курса</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:#FFFFFF;
  color:#333;
  min-height:100vh;
  overflow-x:hidden;
}

.container{
  max-width:1200px;
  margin:0 auto;
  padding:50px 24px 60px;
}

.header{
  text-align:center;
  margin-bottom:48px;
}
.header h1{
  font-size:2.6rem;
  font-weight:800;
  background:linear-gradient(135deg,#7B2FF2,#A855F7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
}
.header .subtitle{
  color:#999;
  font-size:1.05rem;
  font-weight:400;
}

.main-content{
  display:flex;
  gap:36px;
  align-items:flex-start;
}

.modules-section{flex:1;min-width:0}

.modules-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.module-card{
  background:#fff;
  border:1.5px solid #EEECEC;
  border-radius:16px;
  padding:22px 20px;
  cursor:pointer;
  transition:all .35s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.module-card.visible{opacity:1;transform:translateY(0)}

.module-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;background:var(--accent);opacity:.35;
  transition:opacity .3s;
}
.module-card:hover{
  transform:translateY(-5px);
  border-color:#ddd;
  box-shadow:0 12px 36px rgba(0,0,0,.08);
}
.module-card:hover::before{opacity:1}

.module-card.selected{
  border-color:color-mix(in srgb,var(--accent) 50%,transparent);
  box-shadow:0 4px 20px rgba(var(--rgb),.12);
}
.module-card.selected::before{opacity:1}

.module-card.highlighted{
  border-color:#ccc;
  background:#FDFCFA;
}

.module-card .check{
  position:absolute;top:14px;right:14px;
  width:22px;height:22px;border-radius:50%;
  border:2px solid #E0DDD8;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;font-size:.65rem;color:transparent;
}
.module-card.selected .check{
  background:var(--accent);border-color:var(--accent);color:#fff;
  box-shadow:0 2px 8px rgba(var(--rgb),.25);
}

.module-card .icon{
  font-size:1.9rem;display:inline-block;margin-bottom:10px;
  transition:transform .3s;
}
.module-card:hover .icon{transform:scale(1.15) rotate(-4deg)}

.module-card .module-num{
  font-size:.62rem;font-weight:700;color:var(--accent);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;
}
.module-card .title{
  font-size:.95rem;font-weight:700;color:#1A1A2E;
  margin-bottom:0;line-height:1.3;
}
.module-card .topics{
  font-size:.78rem;color:#999;line-height:1.55;
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .4s ease,opacity .35s,margin-top .3s;
  margin-top:0;
}
.module-card:hover .topics,
.module-card.selected .topics{
  max-height:80px;opacity:1;margin-top:8px;
}
.module-card .tags{
  display:flex;flex-wrap:wrap;gap:5px;
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .4s ease,opacity .35s,margin-top .3s;
  margin-top:0;
}
.module-card:hover .tags,
.module-card.selected .tags{
  max-height:40px;opacity:1;margin-top:10px;
}
.tag{
  font-size:.63rem;padding:3px 9px;border-radius:10px;
  background:rgba(var(--rgb),.1);color:var(--accent);font-weight:600;
}

.project-section{
  width:340px;flex-shrink:0;
  background:linear-gradient(160deg,#FDFAFF,#FBF5FF,#FFF8FD);
  border:1.5px solid #EDE5F0;
  border-radius:24px;
  padding:32px 28px;
  text-align:center;
  position:sticky;top:30px;
  transition:border-color .5s,box-shadow .5s;
}
.project-section.completed{
  border-color:#C9A0F0;
  box-shadow:0 8px 50px rgba(123,47,242,.1);
}

.pizza-wrap{
  width:220px;height:220px;margin:0 auto 10px;position:relative;
}
.pizza-wrap svg{
  width:100%;height:100%;
  filter:drop-shadow(0 8px 20px rgba(120,80,30,.18));
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.project-section.completed .pizza-wrap svg{
  animation:pizzaCelebrate .7s ease;
}
@keyframes pizzaCelebrate{
  0%{transform:scale(1) rotate(0)}
  30%{transform:scale(1.08) rotate(4deg)}
  60%{transform:scale(1.08) rotate(-3deg)}
  100%{transform:scale(1) rotate(0)}
}

.pizza-hint{
  font-style:italic;
  font-size:.78rem;
  color:#bbb;
  margin-bottom:22px;
  line-height:1.45;
  transition:opacity .4s,color .4s;
}
.project-section.completed .pizza-hint{
  opacity:0;
}

.pizza-slice-topping{opacity:0;transition:opacity .5s}
.pizza-slice-topping.active{opacity:1}

.project-label{
  font-size:.68rem;font-weight:700;color:#7B2FF2;
  text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;
}
.project-title{
  font-size:1.45rem;font-weight:800;color:#1A1A2E;
  line-height:1.25;margin-bottom:12px;
}
.project-desc{
  font-size:.86rem;color:#999;line-height:1.6;margin-bottom:22px;
}

.progress-bar{
  width:100%;height:6px;background:#EDE5F0;
  border-radius:10px;overflow:hidden;margin-bottom:8px;
}
.progress-fill{
  height:100%;width:0%;border-radius:10px;
  background:linear-gradient(90deg,#7B2FF2,#A855F7);
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.progress-text{
  font-size:.8rem;color:#aaa;font-weight:500;
}
.progress-text span{color:#7B2FF2;font-weight:700}

.completion-badge{
  display:none;margin-top:18px;padding:9px 22px;
  border-radius:20px;font-size:.84rem;font-weight:600;
  background:linear-gradient(135deg,#7B2FF2,#A855F7);
  color:#fff;border:none;cursor:default;
  animation:badgePop .5s cubic-bezier(.68,-.55,.27,1.55);
}
.project-section.completed .completion-badge{display:inline-block}
@keyframes badgePop{
  0%{transform:scale(0);opacity:0}
  100%{transform:scale(1);opacity:1}
}

.reset-btn{
  display:block;margin:16px auto 0;padding:7px 18px;
  border-radius:12px;font-size:.75rem;font-weight:600;
  background:rgba(0,0,0,.03);color:#bbb;
  border:1px solid #EEECEC;cursor:pointer;
  transition:all .3s;font-family:'Inter',sans-serif;
}
.reset-btn:hover{background:rgba(0,0,0,.06);color:#888;border-color:#ccc}

.confetti{
  position:fixed;width:8px;height:8px;border-radius:2px;
  pointer-events:none;z-index:1000;
  animation:confettiPop 1s ease-out forwards;
}
@keyframes confettiPop{
  0%{transform:translate(0,0) rotate(0) scale(1);opacity:1}
  100%{transform:translate(var(--x),var(--y)) rotate(var(--r)) scale(0);opacity:0}
}

@media(max-width:960px){
  .main-content{flex-direction:column}
  .project-section{width:100%;position:static;
    display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:24px;
    text-align:center;padding:28px 24px;
  }
  .pizza-wrap{margin:0}
  .pizza-hint{width:100%;order:2}
  .project-info-wrap{flex:1;min-width:220px}
  .project-label,.project-title,.project-desc,.progress-bar,.progress-text{text-align:left}
}
@media(max-width:640px){
  .modules-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .header h1{font-size:1.9rem}
  .container{padding:32px 14px 50px}
  .project-section{flex-direction:column}
  .project-label,.project-title,.project-desc,.progress-bar,.progress-text{text-align:center}
}
@media(max-width:400px){
  .modules-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Чему вы научитесь</h1>
    <p class="subtitle">Какие знания даст вам итоговый проект</p>
  </div>

  <div class="main-content">
    <div class="modules-section">
      <div class="modules-grid" id="modulesGrid"></div>
    </div>

    <div class="project-section" id="projectSection">
      <div class="pizza-wrap" id="pizzaWrap"></div>
      <p class="pizza-hint">Соберите пиццу, выбирая модули,<br>которые вам предстоит изучить</p>
      <div class="project-info-wrap">
        <div class="project-label">Итоговый проект</div>
        <h2 class="project-title">Mobile Street Food</h2>
        <p class="project-desc">Микросервисная архитектура food&#8209;tech приложения с&nbsp;алгоритмическим движком</p>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text">Изучено: <span id="progressCount">0</span>&thinsp;/&thinsp;9 модулей</div>
        <div class="completion-badge">🎉 Проект собран!</div>
        <button class="reset-btn" id="resetBtn">↺ Сбросить</button>
      </div>
    </div>
  </div>
</div>

<script>
const modules = [
  {id:0, icon:'🏗️', title:'Архитектурные стили',     topics:'Основные понятия, монолит, микросервис и др.',                tags:['Монолит','Микросервис','SOA'],    color:'#FF6B35', rgb:'255,107,53'},
  {id:1, icon:'📋', title:'Требования',               topics:'Виды требований, требования и цели',                        tags:['FR','NFR','Цели'],                color:'#8B5CF6', rgb:'139,92,246'},
  {id:2, icon:'🎯', title:'Принципы проектирования',   topics:'Паттерны, тактики, безопасность',                            tags:['SOLID','Паттерны','Security'],    color:'#10B981', rgb:'16,185,129'},
  {id:3, icon:'🔗', title:'Технологии интеграции',      topics:'HTTP, REST, OpenAPI Spec, AsyncAPI',                         tags:['REST','gRPC','AsyncAPI'],          color:'#F43F5E', rgb:'244,63,94'},
  {id:4, icon:'💾', title:'Хранение информации',        topics:'Реляционные и нереляционные БД, проектирование моделей',     tags:['SQL','NoSQL','Модели'],            color:'#3B82F6', rgb:'59,130,246'},
  {id:5, icon:'☁️', title:'Системная архитектура',      topics:'Linux, CI/CD, Kubernetes, облачная архитектура',              tags:['K8s','CI/CD','Cloud'],             color:'#F59E0B', rgb:'245,158,11'},
  {id:6, icon:'📝', title:'Документация',               topics:'UML, BPMN, 4+1, C4, ADR',                                   tags:['UML','C4','ADR'],                 color:'#06B6D4', rgb:'6,182,212'},
  {id:7, icon:'🔧', title:'Микросервисная архитектура',  topics:'Проектирование, внедрение, поддержка',                      tags:['Design','Deploy','Maintain'],      color:'#A855F7', rgb:'168,85,247'},
  {id:8, icon:'🤝', title:'Soft Skills',                topics:'Тайм-менеджмент, коммуникации, переговоры',                 tags:['Общение','Время','Переговоры'],   color:'#14B8A6', rgb:'20,184,166'},
];

const selected = new Set();
let cardEls = [];
const grid = document.getElementById('modulesGrid');

modules.forEach((m, i) => {
  const card = document.createElement('div');
  card.className = 'module-card';
  card.style.setProperty('--accent', m.color);
  card.style.setProperty('--rgb', m.rgb);
  card.innerHTML = `
    <div class="check">✓</div>
    <span class="icon">${m.icon}</span>
    <div class="module-num">Модуль ${m.id + 1}</div>
    <div class="title">${m.title}</div>
    <div class="topics">${m.topics}</div>
    <div class="tags">${m.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  card.addEventListener('click', () => toggle(m.id));
  card.addEventListener('mouseenter', () => highlightSlice(m.id, true));
  card.addEventListener('mouseleave', () => highlightSlice(m.id, false));
  setTimeout(() => card.classList.add('visible'), 80 + i * 70);
  grid.appendChild(card);
  cardEls.push(card);
});

function highlightSlice(id, on){
  const g = document.getElementById('slice-group-'+id);
  if(g) g.style.filter = on && !selected.has(id) ? 'brightness(1.12)' : '';
}

function buildPizza(){
  const wrap = document.getElementById('pizzaWrap');
  const S = 240, cx = S/2, cy = S/2, R = 105, crustW = 14, cheeseR = R - crustW;
  const N = 9, step = 360/N;

  let seed = 42;
  function rng(){ seed=(seed*16807)%2147483647; return(seed-1)/2147483646; }
  function rr(a,b){return a+(b-a)*rng()}

  let svg = `<svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">`;

  svg += `<defs>
    <radialGradient id="cheeseGrad" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#FDDA6E"/>
      <stop offset="60%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#E8B830"/>
    </radialGradient>
    <radialGradient id="sauceGrad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#D94420"/>
      <stop offset="100%" stop-color="#C33A18"/>
    </radialGradient>
    <radialGradient id="crustGrad" cx="50%" cy="50%">
      <stop offset="60%" stop-color="#D4A44A"/>
      <stop offset="85%" stop-color="#C4903A"/>
      <stop offset="100%" stop-color="#B07E30"/>
    </radialGradient>
    <filter id="pizzaShadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".18" flood-color="#6B4010"/></filter>
    <clipPath id="pizzaClip"><circle cx="${cx}" cy="${cy}" r="${R}"/></clipPath>
  </defs>`;

  svg += `<circle cx="${cx}" cy="${cy+4}" r="${R+2}" fill="rgba(100,60,20,.08)" filter="url(#pizzaShadow)"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#crustGrad)"/>`;

  for(let i=0;i<28;i++){
    const a = (i/28)*Math.PI*2;
    const br = R + rr(2,5);
    svg += `<circle cx="${(cx+br*Math.cos(a)).toFixed(1)}" cy="${(cy+br*Math.sin(a)).toFixed(1)}" r="${rr(4,7).toFixed(1)}" fill="#C89040" opacity=".5"/>`;
  }
  for(let i=0;i<18;i++){
    const a = (i/18)*Math.PI*2;
    const br = R - rr(1,5);
    svg += `<circle cx="${(cx+br*Math.cos(a)).toFixed(1)}" cy="${(cy+br*Math.sin(a)).toFixed(1)}" r="${rr(1.5,3).toFixed(1)}" fill="#E0B868" opacity=".35"/>`;
  }

  svg += `<circle cx="${cx}" cy="${cy}" r="${cheeseR}" fill="url(#sauceGrad)"/>`;

  {
    let pts = [];
    for(let i=0;i<36;i++){
      const a=(i/36)*Math.PI*2;
      const cr=cheeseR - rr(1,5);
      pts.push(`${(cx+cr*Math.cos(a)).toFixed(1)},${(cy+cr*Math.sin(a)).toFixed(1)}`);
    }
    svg += `<polygon points="${pts.join(' ')}" fill="url(#cheeseGrad)"/>`;
  }

  for(let i=0;i<30;i++){
    const a=rng()*Math.PI*2, d=rr(8,cheeseR-10);
    svg += `<circle cx="${(cx+d*Math.cos(a)).toFixed(1)}" cy="${(cy+d*Math.sin(a)).toFixed(1)}" r="${rr(2,6).toFixed(1)}" fill="#EABB38" opacity="${rr(.15,.3).toFixed(2)}"/>`;
  }
  for(let i=0;i<18;i++){
    const a=rng()*Math.PI*2, d=rr(10,cheeseR-12);
    svg += `<circle cx="${(cx+d*Math.cos(a)).toFixed(1)}" cy="${(cy+d*Math.sin(a)).toFixed(1)}" r="${rr(1.5,3.5).toFixed(1)}" fill="#F7E898" opacity="${rr(.25,.5).toFixed(2)}"/>`;
  }

  for(let i=0;i<N;i++){
    const a = (-90 + i*step)*Math.PI/180;
    const x2 = cx+R*Math.cos(a), y2 = cy+R*Math.sin(a);
    svg += `<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" stroke="#A0752A" stroke-width="1.2" opacity=".5"/>`;
    svg += `<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" stroke="#F5DFA0" stroke-width=".6" opacity=".3"/>`;
  }

  const toppingGenerators = [
    (cx,cy,a1,a2,r) => {
      let s=''; for(let j=0;j<3;j++){
        const a=a1+(a2-a1)*rr(.25,.75), d=rr(r*.25,r*.7);
        const x=cx+d*Math.cos(a), y=cy+d*Math.sin(a), tr=rr(5,8);
        s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${tr.toFixed(1)}" fill="#C0281C"/>`;
        s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(tr-1.5).toFixed(1)}" fill="#D83830"/>`;
        s+=`<circle cx="${(x-1).toFixed(1)}" cy="${(y-1).toFixed(1)}" r="${rr(1,2).toFixed(1)}" fill="#E85850" opacity=".5"/>`;
      } return s;
    },
    (cx,cy,a1,a2,r) => {
      let s=''; for(let j=0;j<3;j++){
        const a=a1+(a2-a1)*rr(.2,.8), d=rr(r*.2,r*.65);
        const x=cx+d*Math.cos(a), y=cy+d*Math.sin(a), rot=rr(0,360);
        s+=`<ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="7" ry="4" fill="#3A8C3F" transform="rotate(${rot.toFixed(0)} ${x.toFixed(1)} ${y.toFixed(1)})"/>`;
        s+=`<ellipse cx="${x.toFixed(1)}" cy="${(y-.5).toFixed(1)}" rx="5" ry="2.5" fill="#4DA652" transform="rotate(${rot.toFixed(0)} ${x.toFixed(1)} ${y.toFixed(1)})" opacity=".6"/>`;
      } return s;
    },
    (cx,cy,a1,a2,r) => {
      let s=''; for(let j=0;j<3;j++){
        const a=a1+(a2-a1)*rr(.2,.8), d=rr(r*.25,r*.65);
        const x=cx+d*Math.cos(a), y=cy+d*Math.sin(a);
        s+=`<ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="7" ry="5" fill="#E8D5B8"/>`;
        s+=`<rect x="${(x-2).toFixed(1)}" y="${y.toFixed(1)}" width="4" height="5" rx="1.5" fill="#DCC8A8"/>`;
        s+=`<ellipse cx="${x.toFixed(1)}" cy="${(y-.5).toFixed(1)}" rx="5.5" ry="3.5" fill="#F0E0C8" opacity=".5"/>`;
      } return s;
    },
    (cx,cy,a1,a2,r) => {
      let s=''; for(let j=0;j<3;j++){
        const a=a1+(a2-a1)*rr(.25,.75), d=rr(r*.25,r*.7);
        const x=cx+d*Math.cos(a), y=cy+d*Math.sin(a), tr=rr(4,6);
        s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${tr.toFixed(1)}" fill="#E83020"/>`;
        s+=`<circle cx="${(x-1).toFixed(1)}" cy="${(y-1.5).toFixed(1)}" r="${(tr*.35).toFixed(1)}" fill="#FF6050" opacity=".6"/>`;
      } return s;
    },
    (cx,cy,a1,a2,r) => {
      let s=''; for(let j=0;j<3;j++){
        const a=a1+(a2-a1)*rr(.2,.8), d=rr(r*.2,r*.7);
        const x=cx+d*Math.cos(a), y=cy+d*Math.sin(a);
        s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5.5" fill="#1A1A1A"/>`;
        s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="#3A3A2A"/>`;
        s+=`<circle cx="${(x-.8).toFixed(1)}" cy="${(y-.8).toFixed(1)}" r="1.2" fill="#555" opacity=".4"/>`;
      } return s;
    },
    (cx,cy,a1,a2,r) => {
      let s=''; for(let j=0;j<4;j++){
        const a=a1+(a2-a1)*rr(.2,.8), d=rr(r*.2,r*.65);
        const x=cx+d*Math.cos(a), y=cy+d*Math.sin(a), rot=rr(0,360);
        s+=`<rect x="${(x-5).toFixed(1)}" y="${(y-2).toFixed(1)}" width="10" height="4" rx="2" fill="#E8C820" transform="rotate(${rot.toFixed(0)} ${x.toFixed(1)} ${y.toFixed(1)})"/>`;
      } return s;
    },
    (cx,cy,a1,a2,r) => {
      let s=''; for(let j=0;j<3;j++){
        const a=a1+(a2-a1)*rr(.2,.8), d=rr(r*.25,r*.65);
        const x=cx+d*Math.cos(a), y=cy+d*Math.sin(a);
        s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5" fill="none" stroke="#D8B0D0" stroke-width="2.5" opacity=".7"/>`;
        s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="none" stroke="#E8C8E0" stroke-width="1" opacity=".5"/>`;
      } return s;
    },
    (cx,cy,a1,a2,r) => {
      let s=''; for(let j=0;j<2;j++){
        const a=a1+(a2-a1)*rr(.25,.75), d=rr(r*.25,r*.6);
        const x=cx+d*Math.cos(a), y=cy+d*Math.sin(a), rot=rr(0,360);
        s+=`<ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="10" ry="6" fill="#E08890" transform="rotate(${rot.toFixed(0)} ${x.toFixed(1)} ${y.toFixed(1)})" opacity=".85"/>`;
        s+=`<ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="7" ry="3.5" fill="#E8A0A8" transform="rotate(${rot.toFixed(0)} ${x.toFixed(1)} ${y.toFixed(1)})" opacity=".4"/>`;
      } return s;
    },
    (cx,cy,a1,a2,r) => {
      let s=''; for(let j=0;j<5;j++){
        const a=a1+(a2-a1)*rr(.2,.8), d=rr(r*.2,r*.7);
        const x=cx+d*Math.cos(a), y=cy+d*Math.sin(a);
        s+=`<ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="3" ry="2.2" fill="#F0D028"/>`;
        s+=`<ellipse cx="${(x-.3).toFixed(1)}" cy="${(y-.5).toFixed(1)}" rx="1.5" ry="1" fill="#F8E060" opacity=".5"/>`;
      } return s;
    },
  ];

  for(let i=0;i<N;i++){
    const a1d = -90 + i*step, a2d = -90 + (i+1)*step;
    const a1 = a1d*Math.PI/180, a2 = a2d*Math.PI/180;
    const x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
    const x2=cx+R*Math.cos(a2), y2=cy+R*Math.sin(a2);

    svg += `<g id="slice-group-${i}" style="cursor:pointer">`;
    svg += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 0,1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="transparent" id="slice-hit-${i}"/>`;
    svg += `<g class="pizza-slice-topping" id="topping-${i}" clip-path="url(#pizzaClip)">`;
    svg += toppingGenerators[i](cx, cy, a1, a2, cheeseR);
    svg += `</g>`;
    svg += `</g>`;
  }

  for(let i=0;i<N;i++){
    const a1 = (-90+i*step)*Math.PI/180;
    const a2 = (-90+(i+1)*step)*Math.PI/180;
    const x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
    const x2=cx+R*Math.cos(a2), y2=cy+R*Math.sin(a2);
    svg += `<path id="slice-dim-${i}" d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 0,1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="rgba(255,255,255,.65)" style="pointer-events:none;transition:opacity .4s" opacity="1"/>`;
  }

  svg += `<circle cx="${cx}" cy="${cy}" r="18" fill="#FFFDF8" stroke="#E0C888" stroke-width="1.5"/>`;
  svg += `<text id="pizzaCount" x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="#B08430" font-size="11" font-weight="700" font-family="Inter,sans-serif">0/9</text>`;

  svg += `</svg>`;
  wrap.innerHTML = svg;

  modules.forEach(m => {
    const g = document.getElementById('slice-group-'+m.id);
    g.addEventListener('click', () => toggle(m.id));
    g.addEventListener('mouseenter', () => cardEls[m.id].classList.add('highlighted'));
    g.addEventListener('mouseleave', () => cardEls[m.id].classList.remove('highlighted'));
  });
}
buildPizza();

function toggle(id){
  const wasComplete = selected.size === 9;
  if(selected.has(id)) selected.delete(id); else selected.add(id);
  refresh();
  if(!wasComplete && selected.size === 9) celebrate();
}

function refresh(){
  const n = selected.size;
  modules.forEach(m => {
    const card = cardEls[m.id];
    const topping = document.getElementById('topping-'+m.id);
    const dim = document.getElementById('slice-dim-'+m.id);
    if(selected.has(m.id)){
      card.classList.add('selected');
      topping.classList.add('active');
      dim.setAttribute('opacity','0');
    } else {
      card.classList.remove('selected');
      topping.classList.remove('active');
      dim.setAttribute('opacity','1');
    }
  });
  document.getElementById('pizzaCount').textContent = n+'/9';
  document.getElementById('progressFill').style.width = (n/9*100)+'%';
  document.getElementById('progressCount').textContent = n;
  document.getElementById('projectSection').classList.toggle('completed', n===9);
}

document.getElementById('resetBtn').addEventListener('click', () => {
  selected.clear();
  refresh();
});

function celebrate(){
  const ps = document.getElementById('projectSection');
  const rect = ps.getBoundingClientRect();
  const ox = rect.left + rect.width/2;
  const oy = rect.top + rect.height * .3;
  const colors = modules.map(m=>m.color);
  for(let i=0;i<40;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    const size = 5 + Math.random()*7;
    c.style.width = size+'px';
    c.style.height = size+'px';
    c.style.background = colors[i % colors.length];
    c.style.borderRadius = Math.random()>.5 ? '50%' : '2px';
    c.style.left = ox+'px';
    c.style.top = oy+'px';
    c.style.setProperty('--x', (Math.random()-.5)*420+'px');
    c.style.setProperty('--y', (Math.random()-.7)*350+'px');
    c.style.setProperty('--r', Math.random()*720+'deg');
    c.style.animationDuration = (.7+Math.random()*.6)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 1400);
  }
}
</script>
